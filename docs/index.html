			<div class="f fr w100 p5">
				<div class="f falc fje mr2" style="width:40%"><label for="userId">Account Name:</label></div>

			</div>
			<div class="f fr w100 p5">
				<div class="f falc fje mr2" style="width:40%"><label for="userId">User ID:</label></div>
				<div class="f falc fjs ml2" style="width:60%"><input type="input" name="userId" id="userId" placeholder="Required"></div>
			</div>
			<div class="f fr w100 p5">
				<div class="f falc fje mr2" style="width:40%"><label for="userHash">User Hash:</label></div>

			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fje mr2" style="width:50%"><input type="button" onClick="saveUserData()" id="settingsMenuButtonSave" value="Save"></div>

			</div>
			<div class="f fr w100 p5">
				&nbsp;
			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fjs ml2" style="width:100%">Accounts:</div>
			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fjc ml2" style="width:100%">
					<select id="settingsMenuAccountsList">
						<option value="" selected>-</option>
					</select>
				</div>
			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fje mr2" style="width:50%"><input type="button" onClick="loadUserAccount()" id="settingsMenuButtonLoadAccount" value="Load"></div>
				<div class="f falc fjs ml2 redButton" style="width:50%"><input type="button" onClick="renderDeleteAccountConfirmationPopup()" id="settingsMenuButtonDeleteAccount" value="Delete"></div>
				<div class="f fc fals fjs p5 posAbs deleteAcccountPopup" id="settingsMenuDeleteAccountConfirmationPopup" style="display:none;">&nbsp;</div>
			</div>
			<div class="f fr w100 p5">
				&nbsp;
			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fjs ml2" style="width:100%">Support URL:</div>
			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fjc mb2" style="width:100%"><input type="input" name="supportUrl" id="supportUrl" style="width:100%"></div>
			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fjc mb2" style="width:100%"><input type="button" onClick="supportUrlSaveData()" id="supportUrlMenuButton" value=" Get User Data From Support Url " style="width:100%"></div>
			</div>
			<div class="f fr w100 p5">
				&nbsp;
			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fjs ml2" style="width:100%">Tab Layout Controls:</div>
			</div>

				<div class="f falc fjc mb2" style="width:100%" id="tabsEditModeButtonContainer"><input type="button" onClick="t_toggleEditMode()" id="tabsEditModeButton" value=" Enable Tab Edit Mode " style="width:100%"></div>
			</div>
			<div class="f fr w100 p5">
				<div class="f falc fjs ml2 redButton" style="width:100%">
					<input type="button" onClick="renderRestoreDefaultTabsConfirmationPopup()" id="tabsRestoreDefaultsButton" value="Restore Default Tabs" style="width:100%">

				<div class="f fc fals fjs p5 posAbs deleteAcccountPopup" id="tabsRestoreDefaultsConfirmationPopup" style="display:none;">&nbsp;</div>
			</div>
			<div class="f fr w100 p5">

			</div>
			<div class="f fr w100 p5">	
				<div class="f falc fjs ml2" style="width:100%">Options:</div>

					<select id="settingsNumberFormat" onInput="changeCurrentNumberFormat(this.value)" style="width:95%;font-family:monospace">
						<option value="" selected>-</option>
					</select>
				</div>
			</div>
		</div>
